<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>실험실 — 파란수박</title>
<link rel="icon" type="image/png" href="1.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.lang-toggle {
  position: fixed; top: 28px; right: 56px; z-index: 200;
  font-family: var(--sans); font-size: 12px; letter-spacing: 0.1em;
  color: rgba(255,255,255,0.5); cursor: pointer;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12);
  padding: 6px 14px; transition: all 0.3s; user-select: none;
}
.lang-toggle:hover { color: #fff; border-color: rgba(255,255,255,0.3); }

.page-hero { padding: 160px 64px 60px; max-width: 1280px; margin: 0 auto; }

.experiment-item {
  border-top: 1px solid #1E1E2E;
  padding: 72px 64px;
  max-width: 1280px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 80px;
  align-items: start;
}

.exp-left {}

.exp-code {
  font-family: var(--sans); font-size: 13px; letter-spacing: 0.2em;
  color: var(--blue); margin-bottom: 12px;
}

.exp-status {
  display: inline-block;
  font-family: var(--sans); font-size: 11px; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--gray);
  padding: 6px 12px; border: 1px solid #1E1E2E;
}

.exp-right {}

.exp-name {
  font-family: var(--serif); font-size: clamp(28px, 4vw, 48px);
  font-weight: 300; color: #ffffff; line-height: 1.2; margin-bottom: 32px;
}

.exp-hints {
  display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 28px;
}

.exp-hint {
  font-family: var(--sans); font-size: 14px; font-weight: 300;
  color: rgba(255,255,255,0.45); letter-spacing: 0.03em;
}

.exp-desc {
  font-size: 17px; font-weight: 300; line-height: 1.9;
  color: rgba(255,255,255,0.5);
}

@media (max-width: 768px) {
  .page-hero { padding: 130px 28px 40px; }
  .experiment-item { grid-template-columns: 1fr; gap: 28px; padding: 48px 28px; }
}
</style>
</head>
<body>

<div class="lang-toggle" id="lang-toggle" onclick="toggleLang()">EN</div>

<nav id="main-nav">
  <a href="index.html" class="nav-logo"><img src="9.png" alt="파란수박"></a>
  <ul class="nav-links">
    <li><a href="report.html" data-ko="보고서" data-en="REPORT">보고서</a></li>
    <li><a href="lab.html" class="active" data-ko="실험실" data-en="LAB">실험실</a></li>
    <li><a href="hq.html" data-ko="파란수박본부" data-en="B.W.H.Q">파란수박본부</a></li>
    <li><a href="contact.html" data-ko="안녕하세요?" data-en="HELLO?">안녕하세요?</a></li>
  </ul>
</nav>

<div class="page-hero">
  <span class="section-label reveal" data-ko="실험실" data-en="LAB">실험실</span>
  <h1 class="section-title reveal" style="color:#ffffff;">관측된 지구인의<br>기록들.</h1>
  <div class="section-divider"></div>
</div>

<!-- BW-01 -->
<div class="experiment-item reveal">
  <div class="exp-left">
    <div class="exp-code">BW-01</div>
    <div class="exp-status" data-ko="준비 중" data-en="COMING SOON">준비 중</div>
  </div>
  <div class="exp-right">
    <div class="exp-name">프로젝트 : 풍영정</div>
    <div class="exp-hints">
      <span class="exp-hint">#오천만권짜리시리즈</span>
      <span class="exp-hint">#너도나도모두작가</span>
      <span class="exp-hint">#외계인이들려주는</span>
    </div>
    <div class="exp-desc" data-ko="모든 지구인이 글을 쓰는 프로젝트. 더 많은 정보는 곧 공개됩니다." data-en="A project where every earthling writes. More details coming soon.">모든 지구인이 글을 쓰는 프로젝트. 더 많은 정보는 곧 공개됩니다.</div>
  </div>
</div>

<!-- BW-02 -->
<div class="experiment-item reveal">
  <div class="exp-left">
    <div class="exp-code">BW-02</div>
    <div class="exp-status" data-ko="준비 중" data-en="COMING SOON">준비 중</div>
  </div>
  <div class="exp-right">
    <div class="exp-name">프로젝트 : 쿵쿵따</div>
    <div class="exp-hints">
      <span class="exp-hint">#쿵쿵따리쿵쿵따</span>
      <span class="exp-hint">#쿵쓰쿵쓰</span>
      <span class="exp-hint">#철인3종팀경기</span>
    </div>
    <div class="exp-desc" data-ko="모두가 함께 글을 쓰는 프로젝트. 더 많은 정보는 곧 공개됩니다." data-en="A project where everyone writes together. More details coming soon.">모두가 함께 글을 쓰는 프로젝트. 더 많은 정보는 곧 공개됩니다.</div>
  </div>
</div>

<footer>
  <div class="footer-brand">© 2026 파란수박 — 지구기록보관소</div>
  <div class="footer-coords">본부좌표 — 달 뒷면 / FAR SIDE OF THE MOON</div>
</footer>

<script>
const nav = document.getElementById('main-nav');
nav.style.background = 'rgba(9,9,15,0.92)';
nav.style.backdropFilter = 'blur(12px)';
nav.style.borderBottom = '1px solid #1E1E2E';

const reveals = document.querySelectorAll('.reveal');
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
}, { threshold: 0.08 });
reveals.forEach(el => observer.observe(el));

let isKo = true;
function toggleLang() {
  isKo = !isKo;
  document.getElementById('lang-toggle').textContent = isKo ? 'EN' : 'KO';
  document.querySelectorAll('[data-ko][data-en]').forEach(el => {
    el.textContent = isKo ? el.dataset.ko : el.dataset.en;
  });
}
</script>
</body>
</html>
