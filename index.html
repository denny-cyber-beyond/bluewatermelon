<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>파란수박 — 지구기록보관소</title>
<meta name="description" content="외계인이 설립한 지구기록보관소. 모든 지구인은 한 권의 책입니다.">
<link rel="icon" type="image/png" href="1.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
#hero {
  position: relative; width: 100%; height: 100vh;
  overflow: hidden; display: flex;
  align-items: center; justify-content: center;
  background: #09090F;
}

canvas.star-field {
  position: absolute; inset: 0;
  pointer-events: none; z-index: 1;
}

.earth {
  position: absolute; bottom: -22vh; left: 50%;
  transform: translateX(-50%);
  width: 72vw; max-width: 960px;
  aspect-ratio: 1; border-radius: 50%;
  background:
    radial-gradient(ellipse 45% 35% at 28% 32%, #2B3EE8 0%, transparent 55%),
    radial-gradient(ellipse 30% 25% at 68% 28%, #1A2FA0 0%, transparent 50%),
    radial-gradient(ellipse 40% 30% at 55% 65%, #2DBD6E 0%, transparent 45%),
    radial-gradient(ellipse 25% 20% at 35% 70%, #1A8A50 0%, transparent 40%),
    radial-gradient(ellipse 20% 18% at 80% 55%, #2DBD6E 0%, transparent 40%),
    radial-gradient(ellipse 100% 100% at 50% 50%, #061428 40%, #030A18 100%);
  box-shadow:
    inset -50px -30px 100px rgba(0,0,0,0.85),
    inset 20px 10px 60px rgba(43,62,232,0.12),
    0 0 160px rgba(43,62,232,0.12);
  z-index: 0;
}

.earth::after {
  content: ''; position: absolute; inset: -16px; border-radius: 50%;
  background: radial-gradient(ellipse at 50% 50%,
    transparent 46%, rgba(43,62,232,0.10) 52%,
    rgba(43,62,232,0.05) 62%, transparent 70%);
}

.earth::before {
  content: ''; position: absolute; inset: 0; border-radius: 50%;
  background:
    radial-gradient(ellipse 60% 12% at 50% 22%, rgba(255,255,255,0.07) 0%, transparent 100%),
    radial-gradient(ellipse 40% 8% at 30% 48%, rgba(255,255,255,0.05) 0%, transparent 100%);
}

.shooting-star {
  position: absolute; width: 2px; height: 2px;
  background: #FC5C7D; border-radius: 50%; z-index: 2; opacity: 0;
}
.shooting-star::after {
  content: ''; position: absolute; top: 0; right: 2px;
  width: 100px; height: 1px;
  background: linear-gradient(to left, #FC5C7D, transparent);
}
@keyframes shoot {
  0%   { opacity: 0; transform: translate(0,0); }
  5%   { opacity: 1; }
  80%  { opacity: 0.8; }
  100% { opacity: 0; transform: translate(-320px, 160px); }
}

.hero-content {
  position: relative; z-index: 3;
  text-align: center; padding: 0 32px;
  margin-top: -14vh;
}

.hero-eyebrow {
  font-family: var(--sans); font-size: 15px; font-weight: 400;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--blue); margin-bottom: 40px;
  opacity: 0; animation: fadeUp 1s ease 0.4s forwards;
}

.hero-title {
  font-family: var(--serif);
  font-size: clamp(42px, 7vw, 96px);
  font-weight: 300; line-height: 1.35;
  letter-spacing: -0.01em; color: #ffffff;
  opacity: 0; animation: fadeUp 1s ease 0.8s forwards;
}

.hero-title .changing {
  color: #FC5C7D; display: inline-block;
  transition: opacity 0.3s ease;
  min-width: 2em;
}

.hero-nav {
  position: relative; z-index: 3;
  display: flex; gap: 16px; justify-content: center;
  margin-top: 64px; opacity: 0;
  animation: fadeUp 1s ease 1.2s forwards;
  flex-wrap: wrap;
}

.hero-nav-btn {
  font-family: var(--sans); font-size: 15px; font-weight: 400;
  letter-spacing: 0.08em; color: rgba(255,255,255,0.65);
  text-decoration: none; padding: 16px 36px;
  border: 1px solid rgba(255,255,255,0.18);
  transition: color 0.3s, border-color 0.3s, background 0.3s;
}
.hero-nav-btn:hover {
  color: #ffffff; border-color: var(--blue);
  background: rgba(43,62,232,0.12);
}

.hero-scroll {
  position: absolute; bottom: 36px; left: 50%;
  transform: translateX(-50%); z-index: 3;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  font-family: var(--sans); font-size: 12px; letter-spacing: 0.2em;
  text-transform: uppercase; color: rgba(255,255,255,0.3);
  opacity: 0; animation: fadeUp 1s ease 1.8s forwards;
}
.hero-scroll::after {
  content: ''; display: block; width: 1px; height: 40px;
  background: rgba(255,255,255,0.2);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes pulse {
  0%,100% { opacity:0.2; transform:scaleY(0.5); transform-origin:top; }
  50%     { opacity:1;   transform:scaleY(1);   transform-origin:top; }
}
</style>
</head>
<body>

<div class="lang-toggle" id="lang-toggle" onclick="toggleLang()">EN</div>

<nav id="main-nav">
  <a href="index.html" class="nav-logo">
    <img src="9.png" alt="파란수박">
  </a>
  <ul class="nav-links">
    <li><a href="report.html" data-ko="보고서" data-en="REPORT">보고서</a></li>
    <li><a href="lab.html" data-ko="실험실" data-en="LAB">실험실</a></li>
    <li><a href="hq.html" data-ko="파란수박본부" data-en="B.W.H.Q">파란수박본부</a></li>
    <li><a href="contact.html" data-ko="안녕하세요?" data-en="HELLO?">안녕하세요?</a></li>
  </ul>
</nav>

<section id="hero">
  <canvas class="star-field" id="stars"></canvas>
  <div class="earth"></div>

  <div class="hero-content">
    <p class="hero-eyebrow">지구기록보관소 — Galactic Record Bureau</p>
    <h1 class="hero-title">
      우리는<br>
      <span class="changing" id="changing-text">100억 자산가</span>보다<br>
      당신이 궁금하다
    </h1>
    <nav class="hero-nav">
      <a href="report.html" class="hero-nav-btn" data-ko="보고서" data-en="REPORT">보고서</a>
      <a href="lab.html" class="hero-nav-btn" data-ko="실험실" data-en="LAB">실험실</a>
      <a href="hq.html" class="hero-nav-btn" data-ko="파란수박본부" data-en="B.W.H.Q">파란수박본부</a>
      <a href="contact.html" class="hero-nav-btn" data-ko="안녕하세요?" data-en="HELLO?">안녕하세요?</a>
    </nav>
  </div>

  <div class="hero-scroll">scroll</div>
</section>

<footer>
  <div class="footer-brand">© 2026 파란수박 — 지구기록보관소</div>
  <div class="footer-coords">본부좌표 — 달 뒷면 / FAR SIDE OF THE MOON</div>
</footer>

<script>
// 별 파티클
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let stars = [];

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

function initStars() {
  stars = [];
  const count = Math.floor((canvas.width * canvas.height) / 2800);
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.8 + 0.4,
      speed: Math.random() * 0.007 + 0.002,
      phase: Math.random() * Math.PI * 2,
      bright: Math.random() * 0.5 + 0.5
    });
  }
}

function draw(t) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const s of stars) {
    const a = (Math.sin(t * s.speed + s.phase) + 1) / 2 * s.bright * 0.85 + 0.25;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(220,228,255,${a})`;
    ctx.fill();
  }
  requestAnimationFrame(draw);
}

resize();
initStars();
requestAnimationFrame(draw);
window.addEventListener('resize', () => { resize(); initStars(); });

// 별똥별 (속마음분홍)
function spawnShootingStar() {
  const el = document.createElement('div');
  el.className = 'shooting-star';
  el.style.left = (Math.random() * window.innerWidth * 0.7 + window.innerWidth * 0.15) + 'px';
  el.style.top = (Math.random() * window.innerHeight * 0.45) + 'px';
  const dur = (Math.random() * 1.2 + 0.8).toFixed(2);
  el.style.animation = `shoot ${dur}s ease-out forwards`;
  document.getElementById('hero').appendChild(el);
  setTimeout(() => el.remove(), dur * 1000 + 100);
}

function scheduleShootingStar() {
  setTimeout(() => { spawnShootingStar(); scheduleShootingStar(); }, Math.random() * 4000 + 2500);
}
scheduleShootingStar();

// 타이핑 애니메이션
const koList = ['100억 자산가','5선 국회의원','대기업 대표','1천만 인플루언서','유명 연예인','노벨상 수상자'];
const enList = ['billionaires','5-term politicians','CEOs','10M influencers','celebrities','Nobel laureates'];
let idx = 0;
let isKo = true;
const el = document.getElementById('changing-text');

function changePhrase() {
  el.style.opacity = '0';
  setTimeout(() => {
    idx = (idx + 1) % koList.length;
    el.textContent = isKo ? koList[idx] : enList[idx];
    el.style.opacity = '1';
  }, 350);
}

let interval = setInterval(changePhrase, 2200);

// 한/영 토글
function toggleLang() {
  isKo = !isKo;
  document.getElementById('lang-toggle').textContent = isKo ? 'EN' : 'KO';
  document.querySelectorAll('[data-ko][data-en]').forEach(e => {
    e.textContent = isKo ? e.dataset.ko : e.dataset.en;
  });
  el.textContent = isKo ? koList[idx] : enList[idx];

  // 히어로 타이틀 고정 텍스트 변경
  const title = document.querySelector('.hero-title');
  if (!isKo) {
    title.innerHTML = `We are more curious<br>about <span class="changing" id="changing-text">${enList[idx]}</span><br>than you`;
  } else {
    title.innerHTML = `우리는<br><span class="changing" id="changing-text">${koList[idx]}</span>보다<br>당신이 궁금하다`;
  }
}

// nav 스크롤
const nav = document.getElementById('main-nav');
window.addEventListener('scroll', () => {
  if (window.scrollY > 60) {
    nav.style.background = 'rgba(9,9,15,0.92)';
    nav.style.backdropFilter = 'blur(12px)';
    nav.style.borderBottom = '1px solid #1E1E2E';
  } else {
    nav.style.background = 'transparent';
    nav.style.backdropFilter = 'none';
    nav.style.borderBottom = 'none';
  }
}, { passive: true });
</script>
</body>
</html>
